name: bimal_pathology_system
description: Official Windows Desktop Suite for Bimal Pathology and Diagnostic Center. Includes Patient Registration, Result Entry, and PDF Reporting.
publish_to: 'none' # This is a private package.
version: 1.0.0+1

environment:
  sdk: '>=2.19.0 <4.0.0'
  flutter: '>=3.7.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  go_router: ^16.0.0
  idb_shim: ^2.6.0
  # ➕ PDF र Printing को लागि यो २ वटा लाइन थप्नुहोस्:
  pdf: ^3.10.3
  printing: ^5.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true