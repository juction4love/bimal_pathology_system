name: Windows Build & Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  FLUTTER_VERSION: 'stable'

jobs:
  build:
    name: Build Windows Desktop App
    runs-on: windows-latest
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - build-mode: debug
            artifact-name: bimal-pathology-debug
          - build-mode: release
            artifact-name: bimal-pathology-release

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐦 Setup Flutter (Stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: 📦 Get Flutter dependencies
        run: |
          flutter pub get

      - name: 🔍 Analyze code
        run: |
          flutter analyze
        continue-on-error: true

      - name: 🧪 Run tests
        run: |
          flutter test --coverage
        continue-on-error: true

      - name: 🛠️ Build Windows app (${{ matrix.build-mode }})
        run: |
          flutter build windows --${{ matrix.build-mode }} --verbose

      - name: 📦 Create installer artifact
        shell: powershell
        run: |
          # Verify build output exists
          $buildPath = "build/windows/x64/runner/${{ matrix.build-mode | title }}"
          
          if (-Not (Test-Path $buildPath)) {
            Write-Host "❌ Build path not found: $buildPath"
            Write-Host "Available directories:"
            Get-ChildItem "build/windows" -Recurse -Directory | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
          
          Write-Host "✅ Build path found: $buildPath"
          
          # Create ZIP file
          $zipPath = "${{ matrix.artifact-name }}.zip"
          Write-Host "Creating ZIP: $zipPath"
          
          Compress-Archive `
            -Path "$buildPath/*" `
            -DestinationPath $zipPath `
            -Force
          
          # Verify ZIP was created
          if (Test-Path $zipPath) {
            $zipSize = (Get-Item $zipPath).Length / 1MB
            Write-Host "✅ ZIP created successfully: $zipSize MB"
          } else {
            Write-Host "❌ ZIP creation failed"
            exit 1
          }

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-${{ github.run_number }}
          path: ${{ matrix.artifact-name }}.zip
          retention-days: 30
          compression-level: 0
        if: always()

  lint:
    name: Code Quality & Lint
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter (Stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: 📦 Get dependencies
        run: |
          flutter pub get

      - name: 🔍 Dart analyze
        run: |
          flutter analyze --fatal-infos
        continue-on-error: false

      - name: 📋 Dart format check
        run: |
          dart format --set-exit-if-changed lib test
        continue-on-error: true

      - name: 🧹 Check for custom_lint
        run: |
          $pubspec = Get-Content pubspec.yaml
          if ($pubspec -match "custom_lint:") {
            Write-Host "✅ custom_lint found in pubspec.yaml"
            flutter pub run custom_lint
          } else {
            Write-Host "ℹ️  custom_lint not configured (skipping)"
          }
        continue-on-error: true

  security:
    name: Security Checks
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter (Stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: 📦 Get dependencies
        run: |
          flutter pub get

      - name: 🔐 Check for hardcoded secrets
        shell: powershell
        run: |
          $patterns = @(
            'password\s*[:=]\s*["\x27].*["\x27]',
            'api[_-]?key\s*[:=]\s*["\x27].*["\x27]',
            'secret\s*[:=]\s*["\x27].*["\x27]',
            'token\s*[:=]\s*["\x27].*["\x27]'
          )
          
          $found = $false
          foreach ($pattern in $patterns) {
            $matches = Get-ChildItem -Path . -Include *.dart -Recurse `
              | Where-Object { $_.FullName -notmatch 'pubspec.lock|\.git' } `
              | Select-String -Pattern $pattern
            
            if ($matches) {
              Write-Host "⚠️ Potential secrets found:"
              Write-Host $matches
              $found = $true
            }
          }
          
          if ($found) {
            Write-Host "❌ Hardcoded secrets detected!"
            exit 1
          } else {
            Write-Host "✅ No obvious hardcoded secrets found"
          }

      - name: 📦 Check for vulnerable dependencies
        run: |
          flutter pub outdated
        continue-on-error: true

  database:
    name: Database Schema Validation
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter (Stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: 📦 Get dependencies
        run: |
          flutter pub get

      - name: 🗄️ Validate database migrations
        shell: powershell
        run: |
          $migrationPath = "lib/core/database/migrations"
          
          if (Test-Path $migrationPath) {
            $migrations = Get-ChildItem -Path $migrationPath -Filter "*.dart"
            Write-Host "✅ Found $($migrations.Count) migration files"
            foreach ($migration in $migrations) {
              Write-Host "  ✓ $($migration.Name)"
            }
          } else {
            Write-Host "ℹ️ No migrations directory found at $migrationPath"
          }

      - name: 🔍 Validate audit log schema
        shell: powershell
        run: |
          $auditServicePath = "lib/core/services/audit_service.dart"
          
          if (Test-Path $auditServicePath) {
            Write-Host "✅ Audit service found"
            $content = Get-Content $auditServicePath -Raw
            
            if ($content -match "INSERT|append.*only" -or $content -match "no.*UPDATE|no.*DELETE") {
              Write-Host "✅ Audit log appears to be INSERT-ONLY"
            } else {
              Write-Host "⚠️ Verify audit log is INSERT-ONLY"
            }
          } else {
            Write-Host "⚠️ Audit service not found"
          }

  documentation:
    name: Documentation Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📖 Check required documentation
        run: |
          echo "## 📖 Documentation Status" >> $GITHUB_STEP_SUMMARY
          
          files=(
            "README.md"
            "ARCHITECTURE_AUDIT_CHECKLIST.md"
            "CLINICAL_SYSTEM_BEST_PRACTICES.md"
          )
          
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              size=$(wc -l < "$file")
              echo "✅ **$file** ($size lines)" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ **$file** - MISSING" >> $GITHUB_STEP_SUMMARY
            fi
          done

  audit-compliance:
    name: Audit & Compliance Checks
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📋 Verify compliance
        run: |
          echo "## 🔐 Audit Compliance" >> $GITHUB_STEP_SUMMARY
          
          if grep -qi "INSERT.*ONLY" ARCHITECTURE_AUDIT_CHECKLIST.md 2>/dev/null; then
            echo "✅ INSERT-ONLY audit logs documented" >> $GITHUB_STEP_SUMMARY
          fi
          
          if grep -qi "result.*version" CLINICAL_SYSTEM_BEST_PRACTICES.md 2>/dev/null; then
            echo "✅ Result versioning documented" >> $GITHUB_STEP_SUMMARY
          fi
          
          if grep -qi "recovery.*test\|RTO" CLINICAL_SYSTEM_BEST_PRACTICES.md 2>/dev/null; then
            echo "✅ Recovery testing documented" >> $GITHUB_STEP_SUMMARY
          fi

  notify:
    name: Build Notification
    runs-on: ubuntu-latest
    if: always()
    needs: [build, lint, security, database, documentation, audit-compliance]

    steps:
      - name: 📊 Build Report
        run: |
          echo "# 🏗️ Build Pipeline Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Database | ${{ needs.database.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ needs.documentation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Audit | ${{ needs.audit-compliance.result }} |" >> $GITHUB_STEP_SUMMARY
